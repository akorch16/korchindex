# Phase 0-1 local stack: one Postgres, one Redis, the API.
# Later phases add postgres-replica (streaming replication), cron (supercronic
# ingestion), and caddy (HTTPS) — see the plan's Phase 4-6 roadmap.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: korch
      POSTGRES_PASSWORD: korch
      POSTGRES_DB: korchindex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U korch -d korchindex"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://korch:korch@postgres:5432/korchindex
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
