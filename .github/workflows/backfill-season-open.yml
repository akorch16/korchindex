name: Backfill season open price

# On-demand only -- run once when a new season's true opening prices need
# backfilling (year3.json's seasonOpened date), or whenever picks for a new
# season are added. Not on a schedule.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/backfill-season-open.mjs
      - id: commit
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "korch-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/year3.json
            git commit -m "chore: backfill FY26 season-open prices"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # Pushes made with GITHUB_TOKEN don't trigger the push-based deploy,
  # so redeploy explicitly when the backfill changed anything.
  deploy:
    needs: backfill
    if: needs.backfill.outputs.changed == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/deploy.yml
