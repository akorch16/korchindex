name: Update live prices

on:
  schedule:
    # Weekdays at 21:30 UTC — after the US market close
    - cron: "30 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/update-prices.mjs
      - id: commit
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "korch-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/live/prices.json
            git commit -m "chore: update live prices"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # Pushes made with GITHUB_TOKEN don't trigger the push-based deploy,
  # so redeploy explicitly when prices changed.
  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy.yml
