name: Diagnose tickers

# One-off, read-only diagnostic (no commits). workflow_dispatch only.
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/diagnose-tickers.mjs
